services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecosphere
      POSTGRES_USER: ecosphere
      POSTGRES_PASSWORD: ecosphere_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port 5433, not 5432 — a native PostgreSQL service on this machine
      # already owns 5432 on localhost and would silently shadow the container.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosphere"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecosphere:ecosphere_secret@postgres:5432/ecosphere
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecosphere:ecosphere_secret@postgres:5432/ecosphere
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ecosphere:ecosphere_secret@postgres:5432/ecosphere
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000

volumes:
  postgres_data:
  redis_data:
  uploads_data:
